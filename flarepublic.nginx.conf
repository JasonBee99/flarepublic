# /etc/nginx/sites-available/flarepublic.us
#
# Nginx reverse proxy for FlaRepublic — Next.js on PM2 at port 3000.
#
# Install:
#   sudo cp flarepublic.nginx.conf /etc/nginx/sites-available/flarepublic.us
#   sudo ln -s /etc/nginx/sites-available/flarepublic.us /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# After adding SSL with Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d flarepublic.us -d www.flarepublic.us

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

# ── Redirect www → non-www ───────────────────────────────────────────────────
server {
    listen 80;
    server_name www.flarepublic.us;
    return 301 http://flarepublic.us$request_uri;
}

# ── Main server block ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name flarepublic.us;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for Payload media uploads)
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Static assets — long cache ────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Next.js content-hashes filenames — safe to cache forever
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Public folder (favicon, OG image, etc.) ───────────────────────────
    location /public/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Payload API — rate-limit auth endpoints ───────────────────────────
    location /api/users/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # No caching for API responses
        add_header Cache-Control "no-store";
    }

    # ── Payload Admin ─────────────────────────────────────────────────────
    location /admin {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store";
    }

    # ── All other requests → Next.js ──────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Respect Next.js Cache-Control headers — don't override here
        proxy_pass_header Cache-Control;
    }

    # ── Health check (for monitoring) ────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# ── SSL — uncomment after running certbot ────────────────────────────────────
# Certbot will auto-add these blocks. After running:
#   sudo certbot --nginx -d flarepublic.us -d www.flarepublic.us
# Nginx will be updated automatically. You only need to verify the
# proxy_set_header X-Forwarded-Proto https; line is present.
